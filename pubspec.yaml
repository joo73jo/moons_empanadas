name: moons
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/imagenes/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/imagenes/logo_moons.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/imagenes/logo_moons.png"
  min_sdk_android: 23
  windows:
    generate: true
    image_path: "assets/imagenes/logo_moons.png"
    icon_size: 256